<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>北京-张家口 班车预定</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <h1>🚍 北京-张家口 班车预定</h1>
    <p>安全 · 便捷 · 准时</p>
  </div>

  <div class="container">
    <div class="nav-bar">
      <div class="nav-item active" data-tab="booking">我要订票</div>
      <div class="nav-item" data-tab="my">我的订单</div>
    </div>

    <div id="booking-tab">
      <div class="card">
        <div class="card-title">选择线路</div>
        <div class="route-tabs">
          <button class="route-tab active" data-route="北京→张家口">北京 → 张家口</button>
          <button class="route-tab" data-route="张家口→北京">张家口 → 北京</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">选择班次</div>
        <div class="form-group">
          <label class="form-label">乘车日期<span class="required">*</span></label>
          <div class="date-row">
            <div class="date-picker-wrap" id="travelDatePicker">
              <div class="date-picker-input placeholder" id="travelDateDisplay">请选择乘车日期</div>
              <div class="date-picker-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
              </div>
              <input type="hidden" id="travelDate">
            </div>
          </div>
        </div>
        <div class="schedule-summary" id="scheduleSummary" style="display:none;">
          <div class="summary-item">
            <span class="summary-label">可用班次</span>
            <span class="summary-value" id="availableCount">0</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-item">
            <span class="summary-label">总余票数</span>
            <span class="summary-value" id="totalRemaining">0</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-item">
            <span class="summary-label">紧张班次</span>
            <span class="summary-value summary-warn" id="tightCount">0</span>
          </div>
        </div>
        <div class="filter-row">
          <label class="switch">
            <input type="checkbox" id="filterAvailable">
            <span class="slider"></span>
            <span class="switch-label">仅显示有余票</span>
          </label>
        </div>
        <div class="schedule-list" id="scheduleList"></div>
      </div>

      <div class="card">
        <div class="card-title">乘客信息</div>
        <div class="form-group">
          <label class="form-label">姓名<span class="required">*</span></label>
          <input type="text" class="form-input" id="passengerName" placeholder="请输入姓名">
        </div>
        <div class="form-group">
          <label class="form-label">手机号<span class="required">*</span></label>
          <input type="tel" class="form-input" id="passengerPhone" placeholder="请输入手机号" maxlength="11">
        </div>
        <div class="form-group">
          <label class="form-label">身份证号</label>
          <input type="text" class="form-input" id="idCard" placeholder="请输入身份证号（选填）">
        </div>
      </div>

      <button class="btn btn-primary" id="submitBtn">立即预定</button>
    </div>

    <div id="my-tab" class="hidden">
      <div class="card">
        <div class="card-title">查询订单</div>
        <div class="form-group">
          <input type="tel" class="form-input" id="queryPhone" placeholder="输入手机号查询订单">
        </div>
        <button class="btn btn-secondary" id="queryBtn">查询</button>
      </div>
      <div id="bookingList"></div>
    </div>
  </div>

  <div class="modal hidden" id="successModal">
    <div class="modal-content">
      <div class="success-icon">✓</div>
      <h3 class="modal-title">预定成功</h3>
      <div class="modal-body">
        <div class="booking-detail" id="successDetail"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="closeModal()">确定</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="detailModal">
    <div class="modal-content">
      <h3 class="modal-title">订单详情</h3>
      <div class="modal-body">
        <div class="booking-detail" id="detailContent"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeDetailModal()">关闭</button>
        <button class="btn btn-danger" id="cancelBtn">取消订单</button>
      </div>
    </div>
  </div>

  <script src="/js/calendar.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
