<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>班车管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <h1>🚍 班车管理系统</h1>
    <p>北京-张家口 班线</p>
  </div>

  <div class="container">
    <div id="loginView">
      <div class="card login-card">
        <div class="card-title">管理员登录</div>
        <div class="login-error" id="loginError">用户名或密码错误</div>
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" id="adminUsername" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="adminPassword" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" id="loginBtn">登录</button>
      </div>
    </div>

    <div id="adminView" class="hidden">
    <div class="nav-bar">
      <div class="nav-item active" data-tab="pending">待派车</div>
      <div class="nav-item" data-tab="trips">派车记录</div>
      <div class="nav-item" data-tab="buses">车辆管理</div>
    </div>

    <div id="pending-tab">
      <div class="card">
        <div class="card-title">筛选</div>
        <div class="form-group">
          <label class="form-label">日期</label>
          <div class="date-picker-wrap" id="filterDatePicker">
            <div class="date-picker-input placeholder" id="filterDateDisplay">请选择日期</div>
            <div class="date-picker-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </div>
            <input type="hidden" id="filterDate">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">线路</label>
          <select class="form-select" id="filterRoute">
            <option value="">全部线路</option>
            <option value="北京→张家口">北京→张家口</option>
            <option value="张家口→北京">张家口→北京</option>
          </select>
        </div>
        <button class="btn btn-secondary" id="filterBtn">查询</button>
      </div>
      <div id="pendingList"></div>
    </div>

    <div id="trips-tab" class="hidden">
      <div id="tripsList"></div>
    </div>

    <div id="buses-tab" class="hidden">
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="totalBuses">0</div>
          <div class="stat-label">总车辆</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="idleBuses" style="color:#52c41a">0</div>
          <div class="stat-label">空闲</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="dispatchedBuses" style="color:#fa8c16">0</div>
          <div class="stat-label">运行中</div>
        </div>
      </div>
      <div id="busesList"></div>
    </div>
    </div>

    <div style="text-align:center;padding:20px 0;" id="logoutWrap" class="hidden">
      <button class="btn btn-secondary" id="logoutBtn" style="max-width:200px;margin:0 auto;">退出登录</button>
    </div>
  </div>

  <div class="modal hidden" id="assignModal">
    <div class="modal-content">
      <h3 class="modal-title">分配车辆</h3>
      <div class="modal-body">
        <div id="assignInfo" style="margin-bottom:15px;font-size:0.9rem;color:#666;"></div>
        <div class="bus-select" id="busOptions"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeAssignModal()">取消</button>
        <button class="btn btn-primary" id="confirmAssignBtn">确认派车</button>
      </div>
    </div>
  </div>

  <script src="/js/calendar.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
